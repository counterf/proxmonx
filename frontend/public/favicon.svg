<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
  <!-- Background -->
  <rect width="24" height="24" rx="4" fill="#0f1117"/>
  <!-- Top server rack -->
  <rect x="3" y="2" width="18" height="8" rx="1.5" fill="none" stroke="#60a5fa" stroke-width="1.25"/>
  <!-- Bottom server rack -->
  <rect x="3" y="12" width="18" height="8" rx="1.5" fill="none" stroke="#60a5fa" stroke-width="1.25"/>
  <!-- Drive indicator - top -->
  <circle cx="7" cy="6" r="1" fill="#60a5fa"/>
  <!-- Drive label line - top -->
  <line x1="10" y1="6" x2="17" y2="6" stroke="#60a5fa" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Drive indicator - bottom -->
  <circle cx="7" cy="16" r="1" fill="#60a5fa"/>
  <!-- Pulse / activity line - bottom -->
  <polyline points="10,16 11.5,14 13,18 14.5,16 17,16" fill="none" stroke="#60a5fa" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
