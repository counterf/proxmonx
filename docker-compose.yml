services:
  proxmon:
    image: ghcr.io/counterf/proxmon:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','3000')+'/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
